    <title>Side Menu Toggle</title>

</head>
<body>

                <li><a href="#about">About Me</a></li>

    <main>
        <h1>Welcome to My Website</h1>
        <p>This is a demo of a side menu that toggles with a button.</p>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
